name: Daily Price Check

on:
  schedule:
    # Runs at 07:00 UTC daily (12:30 IST / 3:00 AM ET — before US market open)
    - cron: '0 7 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Keep app awake
        # Pings the Streamlit app daily so it never hits the 7-day inactivity sleep.
        # Replace the URL with your actual Streamlit app URL.
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            --max-time 30 \
            "${{ secrets.STREAMLIT_APP_URL }}" || true

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance openai

      - name: Run price checker
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASS:     ${{ secrets.GMAIL_APP_PASS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
        run: python check_prices.py